name: tests

on:
  push:
  pull_request:

jobs:
  postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose up -d
      - run: sleep 5
      - run: make build
      - run: make checks
      - if: always()
        run: docker compose down
